services:
  - type: web
    name: felic-chat-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false        # set manually in dashboard
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
